<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Conference Gallery | Zeinab Mokhtari</title>

  <link rel="icon" href="assets/favicon.png">
  <link rel="stylesheet" href="styles.css">

  <style>
    body {
      margin: 0;
    }

    .gallery-page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 80px 24px 40px;
    }

    .gallery-page h1 {
      text-align: center;
      margin-bottom: 36px;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
    }

    .gallery-item {
      background: var(--card, #1a1d24);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .gallery-item:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.28);
    }

    .gallery-item a {
      color: inherit;
      text-decoration: none;
    }

    .gallery-item img {
      width: 100%;
      height: 260px;
      object-fit: contain;
      background: #111;
      display: block;
    }

    .gallery-caption {
      text-align: center;
      padding: 16px;
      font-size: 1.05rem;
      font-weight: 600;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 24px;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <header class="site-header">
    <nav class="nav">
      <a href="index.html" class="brand">Zeinab Mokhtari</a>

      <ul class="menu">
        <li><a href="index.html">Home</a></li>
        <li><a href="games.html">Games</a></li>
        <li><a href="gallery.html">Gallery</a></li>
      </ul>
    </nav>
  </header>

  <main class="gallery-page">

    <a href="index.html" class="back-link">← Back to Home</a>

    <h1>Conference Gallery</h1>

    <div class="gallery-grid">

      <article class="gallery-item">
        <a href="assets/isls-2026.jpg" target="_blank" rel="noopener">
          <img src="assets/isls-2026.jpg" alt="ISLS 2026 conference">
          <div class="gallery-caption">ISLS 2026</div>
        </a>
      </article>

      <article class="gallery-item">
        <a href="assets/aera-2026-1.jpeg" target="_blank" rel="noopener">
          <img src="assets/aera-2026-1.jpeg" alt="AERA 2026 conference">
          <div class="gallery-caption">AERA 2026</div>
        </a>
      </article>

      <article class="gallery-item">
        <a href="assets/aera-2026-2.jpeg" target="_blank" rel="noopener">
          <img src="assets/aera-2026-2.jpeg" alt="AERA 2026 conference">
          <div class="gallery-caption">AERA 2026</div>
        </a>
      </article>

    </div>
  </main>

</body>
</html>
